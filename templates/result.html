{% extends 'layout.html' %}
{% block content %}
<section class="result-card">
  <h2>Quiz Results</h2>
  <p>You scored <strong>{{ score }} / {{ total }}</strong>.</p>
  <p>Time remaining when submitted: <strong>{{ time_remaining }} seconds</strong>.</p>
  <div class="result-actions">
    <a class="button" href="{{ url_for('quiz') }}">Take another quiz</a>
    <a class="button button-secondary" href="{{ url_for('leaderboard') }}">View leaderboard</a>
  </div>
</section>
{% endblock %}
